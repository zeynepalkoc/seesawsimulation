<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seesaw Simulation</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    
<div class="container">

<section class="stat-panel">
<div class="stat-box">
    <div class="stat-label">Left Weight</div>
    <div class="stat-value" id="leftweight">0.0 kg</div>
</div>

<div class="stat-box">
    <div class="stat-label">Right Weight</div>
    <div class="stat-value" id="rightweight">0.0 kg</div>
</div>

<div class="stat-box">
    <div class="stat-label">Next Weight</div>
    <div class="stat-value" id="nextweight">0.0 kg</div>
</div>

<div class="stat-box">
    <div class="stat-label">Tilt Angle</div>
    <div class="stat-value" id="tiltangle">0.0°</div>
</div>

</section>

<section class="simulate-area" id="simulate-area">
    <div class="pivot"></div>
    <div class="plank" id="plank"></div>
    <div id="objects-container"></div>
</section>

<button id="reset" class="reset" >Reset</button>

</div>
<sctript src="app.js"></script>
</body>
</html>
